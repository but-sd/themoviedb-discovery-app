name: Continuous Integration
on:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: "🧹 - Lint"
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
      - name: "🛠️ Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: "📦 Install dependencies"
        run: npm ci
      - name: "🧹 Run lint"
        run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    name: "🧪 - Unit Tests"
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
      - name: "🛠️ Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: "📦 Install dependencies"
        run: npm ci
      - name: "🧪 Run unit tests"
        run: npm test
